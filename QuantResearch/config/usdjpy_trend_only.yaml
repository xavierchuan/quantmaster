strategies:
  - name: regime_sma
    weight: 1.0
    params:
      trend_params:
        fast_win: 30
        slow_win: 120
        allow_short: true
        # 方向过滤先关掉其一，避免互锁
        long_only_above_slow: false
        short_only_below_slow: true
        slope_lookback: 4          # 降低斜率需求
        cooldown: 12
        atr_sl: 1.6
        atr_tp: 4.0
        atr_window: 14
        rsi_period: 14
        rsi_long_thresh: 55        # 放宽 RSI
        rsi_short_thresh: 45
      range_mode: flat
      atr_percentile_min: 45       # 从 45 起步（之前太高）
      atr_percentile_window: 200
      trend_min_bars: 2            # 连续趋势根数降到 2
      htf_alignment: false         # 先关闭 HTF 对齐，确认本体可交易