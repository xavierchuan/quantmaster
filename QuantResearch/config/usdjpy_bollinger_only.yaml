symbol: USDJPY
csv: data/raw/USDJPY_H1.csv
cash: 100000.0
account_ccy: USD

# ===== 基础交易杠杆 / 成本 =====
qty: 100000           # 基础名义（仅作为下限；实际用风控 sizing）
spread: 1.0
slip: 0.2
comm: 2.0

# ===== HTF（高时间框）过滤 =====
htf_factor: 4                 # 用 H4 对齐（H1×4）
htf_alignment: true
htf_ema_window: 100
htf_rsi_period: 14
htf_rsi_range: [45, 55]       # H4 RSI 区间过滤（可调）

# ===== 动态仓位与风险控制 =====
risk_per_trade_pct: 0.008     # 每笔风险占净值
max_drawdown_pct: 0.05        # 风控断路器（回撤停止）
position_sizing_mode: atr_based
atr_window: 14
regime_atr_percentile_min: 30
regime_atr_percentile_window: 200

# ===== 全局回测窗口内的基础均线参数（便于 grid 扫描覆盖）=====
fast: 30
slow: 120
cooldown: 12

# ===== 策略：仅布林均值回归 =====
strategies:
  - name: bollinger_mean_revert
    weight: 1.0
    params:
      window: 48
      num_std: 2.0
      enter_z: 1.3
      exit_z: 0.3
      cooldown: 6
      allow_short: true
