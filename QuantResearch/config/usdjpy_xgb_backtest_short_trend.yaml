# v1l + trend gating (uses trend_regime model)
symbol: USDJPY
csv: QuantResearch/data/clean/USDJPY_H1_clean_v2.csv

# Trading capital and unit size
cash: 960000.0
qty: 2000000
account_ccy: USD

# Cost assumptions
spread: 2.0
slip: 0.3
comm: 0.25

# Core params
fast: 20
slow: 80
atr_sl: 1.9
atr_tp: 3.8
atr_window: 14
regime_ema_window: 200
regime_trend_min_bars: 0
cooldown: 0
long_only_above_slow: true

# Risk controls (slightly more aggressive)
risk_per_trade_pct: 0.05
max_drawdown_pct: 0.30
max_position_units: 4500000
allow_short: true
short_only_below_slow: true

strategies:
  - name: xgb_signal
    weight: 1.0
    params:
      latest_ptr: QuantResearch/artifacts/models/usdjpy_h1_xgb_short_latest.json
      trend_ptr: QuantResearch/artifacts/models/usdjpy_trend_regime_latest.json
      prob_long: 0.59
      prob_exit: 0.52
      size_mult: 1.05
      cooldown_bars: 5
      low_atr_pct: 0.08
      prob_long_low: 0.58
      cooldown_low: 4
      enable_short_signals: true
      prob_short: 0.57
      prob_short_exit: 0.48
      short_size_mult: 1.05
      allow_short_regimes: ["trend_down", "vol_high"]
      short_cooldown_bars: 5
      vol_high_prob_delta: -0.02
      vol_low_prob_delta: 0.03
      vol_high_size_mult: 1.30
      vol_low_size_mult: 0.85
      vol_high_cooldown: 6
      vol_low_cooldown: 6
      short_vol_high_size_mult: 1.25
      short_vol_low_size_mult: 0.8
      short_vol_high_prob_delta: -0.02
      short_vol_low_prob_delta: 0.01
      short_vol_high_cooldown: 6
      short_vol_low_cooldown: 6
      # Trend gating: trend_up favors long, trend_down favors short, chop is conservative
      trend_up_prob_delta: -0.02
      trend_down_prob_delta: 0.02
      trend_chop_prob_delta: 0.015
      trend_up_size_mult: 1.10
      trend_down_size_mult: 0.95
      trend_chop_size_mult: 0.90
      trend_up_cooldown: 4
      trend_down_cooldown: 7
      trend_chop_cooldown: 8
      trend_up_short_prob_delta: 0.015
      trend_down_short_prob_delta: -0.015
      trend_chop_short_prob_delta: 0.015
      trend_up_short_size_mult: 0.90
      trend_down_short_size_mult: 1.15
      trend_chop_short_size_mult: 0.90
      trend_up_short_cooldown: 6
      trend_down_short_cooldown: 6
      trend_chop_short_cooldown: 8
