# Historical aggressive baseline (matches run 20251116_134840)
symbol: USDJPY
csv: QuantResearch/data/clean/USDJPY_H1_clean_v2.csv

# Trading capital and unit size
cash: 960000.0
qty: 2000000
account_ccy: USD

# Cost assumptions
spread: 2.0
slip: 0.3
comm: 0.25

# Core engine params
fast: 20
slow: 80
atr_sl: 2.0
atr_tp: 4.0
atr_window: 14
regime_ema_window: 200
cooldown: 0

# Risk controls (disabled sizing limits)
risk_per_trade_pct: null
max_drawdown_pct: 0.30
allow_short: false

strategies:
  - name: regime_vol_ml
    weight: 0.0
    params:
      min_confidence: 0.0
  - name: xgb_signal
    weight: 1.0
    params:
      prob_long: 0.64
      prob_exit: 0.50
      size_mult: 1.0
      cooldown_bars: 8
      vol_high_prob_delta: -0.02
      vol_low_prob_delta: 0.03
      vol_high_size_mult: 1.2
      vol_low_size_mult: 0.6
      vol_high_cooldown: 6
      vol_low_cooldown: 12
