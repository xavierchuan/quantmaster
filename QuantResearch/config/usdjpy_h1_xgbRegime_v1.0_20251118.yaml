# Aggressive trend-gated version built on v1l (frozen 2025-11-18)
symbol: USDJPY
csv: QuantResearch/data/clean/USDJPY_H1_clean_v2_with_regime.csv

# Trading capital and unit size
cash: 960000.0
qty: 4000000  # ~5x notional on 960k cash
account_ccy: USD

# Cost assumptions
spread: 2.0
slip: 0.3
comm: 0.25

# Core params
fast: 20
slow: 80
atr_sl: 1.9
atr_tp: 3.8
atr_window: 14
regime_ema_window: 200
regime_trend_min_bars: 0
cooldown: 0
long_only_above_slow: true

# Risk controls (more aggressive)
risk_per_trade_pct: 0.05
max_drawdown_pct: 0.10
max_position_units: 5000000  # cap notional near 5x
allow_short: true
short_only_below_slow: true

strategies:
  - name: xgb_signal
    weight: 1.0
    params:
      latest_ptr: QuantResearch/artifacts/models/usdjpy_h1_xgb_short_latest.json
      trend_ptr: QuantResearch/artifacts/models/usdjpy_trend_regime_latest.json
      prob_long: 0.60
      prob_exit: 0.52
      size_mult: 1.10
      cooldown_bars: 7
      regime_filter:
        trend: ["trend_up", "trend_down"]  # skip chop regime entirely
      session_block_hours:
        - [0, 6]   # avoid 00:00-06:00 UTC high-noise
      low_atr_pct: 0.08
      prob_long_low: 0.55
      cooldown_low: 3
      enable_short_signals: true
      prob_short: 0.58
      prob_short_exit: 0.48
      short_size_mult: 1.15
      allow_short_regimes: ["trend_down", "vol_high"]
      short_cooldown_bars: 7
      vol_high_prob_delta: -0.10
      vol_low_prob_delta: 0.03
      vol_high_size_mult: 0.60
      vol_low_size_mult: 0.85
      vol_high_cooldown: 12
      vol_low_cooldown: 6
      vol_high_atr_sl_mult: 0.60   # tighten high-vol SL ~1.1x when base=1.9
      vol_high_atr_tp_mult: 0.40   # high-vol TP ~1.6x when base=3.8
      vol_low_atr_sl_mult: 1.0
      vol_low_atr_tp_mult: 1.0
      short_vol_high_size_mult: 0.65
      short_vol_low_size_mult: 0.80
      short_vol_high_prob_delta: -0.10
      short_vol_low_prob_delta: 0.01
      short_vol_high_cooldown: 12
      short_vol_low_cooldown: 6
      # Trend gating: slightly higher thresholds / cooldown to steady early windows
      trend_up_prob_delta: -0.02
      trend_down_prob_delta: 0.03
      trend_chop_prob_delta: 0.01
      trend_up_size_mult: 1.20
      trend_down_size_mult: 0.95
      trend_chop_size_mult: 0.90
      trend_up_cooldown: 4
      trend_down_cooldown: 8
      trend_chop_cooldown: 7
      trend_up_short_prob_delta: 0.02
      trend_down_short_prob_delta: -0.02
      trend_chop_short_prob_delta: 0.0
      trend_up_short_size_mult: 0.85
      trend_down_short_size_mult: 1.20
      trend_chop_short_size_mult: 0.90
      trend_up_short_cooldown: 6
      trend_down_short_cooldown: 6
      trend_chop_short_cooldown: 7
      # Trend-aware ATR multipliers (base atr_sl=1.9, atr_tp=3.8)
      trend_up_atr_sl_mult: 1.05   # ~2.0x SL
      trend_up_atr_tp_mult: 1.18   # ~4.5x TP
      trend_down_atr_sl_mult: 0.74 # ~1.4x SL
      trend_down_atr_tp_mult: 0.58 # ~2.2x TP
      trend_chop_atr_sl_mult: 1.0
      trend_chop_atr_tp_mult: 1.0
