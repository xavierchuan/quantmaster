# Global risk profile used by QuantTrader execution scripts.
# risk_scale controls the notional multiplier applied to each strategy's qty.
# Adjust this file (and copy to QuantTrader/artifacts/config if needed) when
# tightening or loosening portfolio risk.
risk_scale: 1.5
max_leverage: 3.0
nav_floor: 900000    # optional: trigger de-risking if NAV < floor
margin_ratio_floor: 0.30
notes: |
  Update risk_scale via change control. 1.0 represents the research baseline.
  Lower the value (e.g., 0.6) during stress, raise it (e.g., 1.3) when
  approved by risk.
