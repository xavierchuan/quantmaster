name: Data Integrity

on:
  pull_request:
    paths:
      - 'QuantResearch/data/**'
      - 'QuantResearch/scripts/**'
      - 'QuantResearch/docs/**'
      - '.github/workflows/data-integrity.yml'
  push:
    branches: [ main ]
    paths:
      - 'QuantResearch/data/**'
      - 'QuantResearch/scripts/**'
      - '.github/workflows/data-integrity.yml'

jobs:
  integrity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: QuantResearch
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run data integrity checks
        run: python scripts/check_data_integrity.py

      - name: Verify cleaned dataset manifest
        run: python scripts/verify_manifest.py --manifest data/_manifest.json

      - name: Validate primary datasets
        run: |
          mkdir -p results/data_quality
          python scripts/validate_dataset.py --path data/raw/EURUSD_H1.csv --output results/data_quality/ci_EURUSD_H1.json
          python scripts/aggregate_data_quality.py --print

      - name: Upload data-quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report
          path: results/data_quality/ci_EURUSD_H1.json
