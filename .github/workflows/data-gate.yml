name: data-gate

on:
  workflow_dispatch: {}
  schedule:
    - cron: "5 0 * * *"  # daily at 00:05 UTC

jobs:
  data_gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r QuantResearch/requirements.txt
      - name: Run data gate (manifest + integrity)
        working-directory: QuantResearch
        run: |
          ./bin/run_data_gate.sh
